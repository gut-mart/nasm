name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: sudo apt-get update && sudo apt-get install -y nasm make binutils

      - name: Verificar herramientas
        run: |
          nasm --version
          ld --version
          make --version

      - name: Ejecutar tests
        run: make test
